<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Officers - Dark Mode</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body{
  background:#121212;
  color:#E0E0E0;
}


header{
  position: fixed;
  top:0;
  width:100%;
  background:#1e1e1e;
  display:flex;
  align-items:center;
  padding:15px 40px;
  box-shadow:0 3px 10px rgba(0,0,0,0.5);
  z-index:1000;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo img{
  height:45px;
}
.logo h1{
  font-size:20px;
  color:#60A5FA;
}
nav{
  margin-left:auto;
}
nav a{
  text-decoration:none;
  margin-left:25px;
  color:#E0E0E0;
  font-weight:500;
  transition:0.3s;
}
nav a:hover{
  color:#60A5FA;
}

/* HERO */
.hero{
  margin-top:80px;
  height:40vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/0cbcbf51d8d769315db5d928921ea4fe11878738/481714088_626366150194488_5962722867243626304_n.jpg");
  background-size:cover;
  background-position:center;
}
.hero h2{
  font-size:40px;
  color:#60A5FA;
}


.officers-container{
  padding:60px 40px;
  display:grid;
  grid-template-columns:1fr;
  justify-items:center;
  gap:40px;
  text-align:center;
}


.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
}

.officer-card{
  background:transparent;
  padding:20px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
  width:220px;
}
.officer-card:hover{
  transform:translateY(-6px);
}


.officer-title{
  font-weight:bold;
  font-size:18px;
  color:#60A5FA;
  margin-bottom:12px;
}

.officer-name{
  margin-top:10px;
  font-weight:500;
  color:#E0E0E0;
}


.officer-frame{
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  border:5px solid #60A5FA;
  display:flex;
  align-items:center;
  justify-content:center;
  background: transparent;
}

.officer-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}


@media (max-width:800px){
  .row{
    flex-direction:column;
    align-items:center;
  }
}


footer{
  margin-top:50px;
  background:#1e1e1e;
  color:#E0E0E0;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>
